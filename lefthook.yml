pre-commit:
  commands:
    check:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,css,scss}'
      run: web/node_modules/.bin/oxfmt --config web/.oxfmtrc.json {staged_files}
      stage_fixed: true
    oxlint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: web/node_modules/.bin/oxlint --config web/.oxlintrc.json --tsconfig web/tsconfig.json --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: pnpm lint
