pre-commit:
  commands:
    secret-scan:
      run: |
        if git diff --cached --unified=0 --diff-filter=ACM | grep -qE '^\+.*(api_key[[:space:]]*:[[:space:]]*"sk-[A-Za-z0-9_-]+|sk-[A-Za-z0-9_-]{16,})'; then
          echo "Potential API key detected in staged changes."
          exit 1
        fi
    check:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,css,scss}'
      run: internal/web/node_modules/.bin/oxfmt --config internal/web/.oxfmtrc.json {staged_files}
      stage_fixed: true
    oxlint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: internal/web/node_modules/.bin/oxlint --config internal/web/oxlint.config.ts --tsconfig internal/web/tsconfig.json --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: pnpm lint
