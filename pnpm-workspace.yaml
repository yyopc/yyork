# pnpm-specific: keep lifecycle side effects uncached so package postinstall
# hooks such as lefthook's installer execute during installs.
side-effects-cache: false

packages:
  - npm/*
  - internal/web
  - internal/docs

catalog:
  react: 19.3.0-canary-d5736f09-20260507
  react-dom: 19.3.0-canary-d5736f09-20260507
  '@types/react': 19.2.10
  '@types/react-dom': 19.2.3
  tailwind-merge: 3.4.0
  lucide-react: 0.563.0
  oxlint: 1.54.0
  typescript: 7.0.1-rc
  clsx: 2.1.1
  npm-run-all: 4.1.5
  vite: 8.0.16
  tailwindcss: 4.3.1

catalogs:
  web:
    '@tailwindcss/postcss': 4.3.1
  docs:
    '@tailwindcss/vite': 4.3.1
