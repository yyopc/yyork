name: Feature request
description: Suggest a new capability or an improvement.
title: '[feat]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Describe the outcome you want, not just the mechanism. The clearer the
        problem, the better the solution we (or an agent) can design.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today? What's the pain?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen? Sketch the UX or API if you have one in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal / renderer
        - Sidebar / session management
        - Canvas / preview
        - Auth / connection
        - Build / tooling / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues. Drag images in directly.
    validations:
      required: false
