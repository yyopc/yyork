name: Setup Playwright
description: Install Playwright system dependencies and configure browser executable

inputs:
  browsers:
    description: Space-separated list of browsers to install
    required: false
    default: 'chromium'

runs:
  using: composite
  steps:
    - name: Install Playwright system deps
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: pnpm --filter @yyork/web exec playwright install-deps $BROWSERS

    - name: Use system Chrome for Chromium
      if: contains(inputs.browsers, 'chromium')
      shell: bash
      run: |
        chromium_executable="$(command -v google-chrome || true)"
        if [[ -z "$chromium_executable" ]]; then
          echo "google-chrome was not found on the runner" >&2
          exit 1
        fi
        "$chromium_executable" --version
        echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$chromium_executable" >> "$GITHUB_ENV"
